front:
  text: 御製孝經序
  hash: sha256:07bfbc7075c322dfc4a2c683145fce7ffa430948c34d2255f97e0ae6a73f9ecd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1f0011_WYG_000-1a, image: WYG0182/WYG0182-0255a.png}
body:
  text: 朕惟孝者首百行而為五倫之本天地所以成化聖人所以立教通之乎萬世而無斁放之於四海而皆準至矣哉誠無以加矣然其廣大雖包乎無外而其淵源實本於因心遡厥初生咸知孺慕雖在顓蒙即備天良故位無尊卑人無賢愚皆可以與知而與能是知孝者乃生人之庸德無甚玄竒抑固有之秉彛非由外鑠誠貴乎篤行而非語言之間所得而盡也雖然降衷之理固根於凡民之心而覺世之功必賴夫聖人之訓苟非著書立説以迪天性自然之善抒人子難已之情使天下之人曉然於日用之恆行即為大經大法之所存而敦行不怠以全其本始夫亦孰由知孝之要盡孝之詳以無忝所生也哉此孔子孝經之書所由作也朕萬幾之暇時加三復自開宗明義迄於終篇見其言近而指逺理約而該博本之立身以行道推之移風而易俗愛敬所著公卿士庶皆得循分以承歡感應所通東西南北罔不漸被而思服誠萬世不刋之懿矩百聖不易之格言自天子以至於庶人不可一日闕者夫子所謂吾志在春秋行在孝經良有以也自漢以來去聖日逺詮釋滋多厥旨寖晦孔安國尚古文鄭玄主今文互有異同各矜識解魏晉而降諸儒羣興析疑闡奧代不乏人源流攸分不無繁蕪逮及開元更立注疏亦既萃一代之菁英垂表章於奕世矣而詳略或殊詎云至當宋之邢昺元之吳澄輩標新領異間有發揮然揆之美善或未盡焉至於明季著述紛紜或拾前賢之緒餘文其謭陋或摘古人之紕繆肆彼譏彈不知天懷既薄問學復疏因心之理未明空文之多奚補其於作經之意均未當耳夫親恩罔極髙厚難酬德至聖人猶虞未盡同為人子孰不佩至教而興永錫之感乎然則訓詁未確漸摩弗力欲其相觀而善厥路無由朕為此慮爰集古今之注更互考訂其得中而窽綮者採輯之其妄逞而臆説者刪除之譬諸沙礫既披美鏐始出稂莠盡剪嘉禾乃登至若流覽之餘時獲一是或足以補未發之藴者輒為增入聊備參觀總以孝之為道甚大而平故不必旁求隱怪用益髙深誇示繁縟徒滋復贅惟以布帛菽粟之言昭廣大中正之理雖未知於作者之旨能盡吻合可無枘鑿與否然而前代諸儒之書瑕瑜難掩與夫近代羣言之失淆亂不稽者於兹正之庶幾發矇啓錮四方億兆咸知效法而允迪共底於大順之休焉夫如是將見至德要道由此而廣和睦無怨由此而成矣順治丙申仲春望日序欽定四庫全書經部六御定孝經注孝經類提要臣等謹案孝經注一卷順治十三年大學士蔣赫德恭纂仰邀欽定御製序文冠首孝經詞近而旨逺等而次之自天子以至於庶人推而廣之自閨門可放諸四海專而致之即愚夫愚婦可通於神明故語其平近則人人可知可行語其精微則聖人亦覃思於闡繹是編御定注一萬餘言用石臺本不用孔安國本息今古文門户之爭也亦不用朱子刋誤本杜改經之漸也義必精粹而詞無深隱期家喻户曉也考歷代帝王注是經者晉元帝有孝經傳晉孝武帝有總明館孝經講義梁武帝有孝經義疏今皆不存惟唐玄宗御注列十三經注疏中流傳於世司馬光范祖禹以下悉不能出其範圍今更得聖製表章使孔曽遺訓無一義之不彰無一人之不喻回視玄宗所注度而越之不啻萬倍矣乾隆四十六年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
